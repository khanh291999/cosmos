name: CI Pipeline - Integration Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      force_fail:
        description: 'Force workload to fail (exit 1) to test teardown'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  pre-check:
    name: Fast Pre-Check Stage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Run Shellcheck (Linter)
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: './app'

  integration:
    name: Provision, Test & Teardown
    needs: pre-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Export Application Image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          tags: test-workload:latest
          outputs: type=docker,dest=/tmp/test-workload.tar
          # Caching container layers to speed up repeat runs
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload Packaged Artifact
        uses: actions/upload-artifact@v4
        with:
          name: packaged-app-image
          path: /tmp/test-workload.tar

      - name: Provision Dedicated Kubernetes Cluster (Kind)
        uses: helm/kind-action@v1.10.0
        with:
          cluster_name: ci-integration-cluster

      - name: Load Workload Image into Kind
        run: kind load image-archive /tmp/test-workload.tar --name ci-integration-cluster

      - name: Provision Real PostgreSQL & Redis via Helm
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo update
          # Install DB without persistence volume (in-memory/ephemeral disk) to speed up provisioning
          helm install postgres bitnami/postgresql --set auth.postgresPassword=secret123,primary.persistence.enabled=false --wait --timeout=120s
          helm install redis bitnami/redis --set architecture=standalone,auth.password=secret123,master.persistence.enabled=false --wait --timeout=120s

      - name: Run Integration Test Workload
        env:
          FORCE_FAIL: ${{ inputs.force_fail || 'false' }}
        run: |
          cat <<EOF | kubectl apply -f -
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: integration-test-job
          spec:
            backoffLimit: 0
            template:
              spec:
                containers:
                - name: test-workload
                  image: test-workload:latest
                  imagePullPolicy: Never
                  env:
                  - name: PG_HOST
                    value: "postgres-postgresql"
                  - name: PG_PASS
                    value: "secret123"
                  - name: REDIS_HOST
                    value: "redis-master"
                  - name: REDIS_PASS
                    value: "secret123"
                  - name: FORCE_FAIL
                    value: "${FORCE_FAIL}"
                restartPolicy: Never
          EOF
          
          # Wait for the job to complete (either success or failure)
          kubectl wait --for=condition=complete job/integration-test-job --timeout=60s || true
          
          # Fetch logs to save as test evidence (Artifact)
          kubectl logs job/integration-test-job > test-results.log
          cat test-results.log
          
          # Evaluate Job's exit code to determine Pipeline Pass or Fail
          if kubectl get job integration-test-job -o jsonpath='{.status.succeeded}' | grep -q 1; then
            echo "✅ Integration tests PASSED."
            exit 0
          else
            echo "❌ Integration tests FAILED (Non-zero exit code)."
            exit 1
          fi

      - name: Upload Test Results
        if: always() # Run even if the test fails
        uses: actions/upload-artifact@v4
        with:
          name: test-results-log
          path: test-results.log

      - name: Teardown Infrastructure
        if: always() # ENSURE the k8s cluster is ALWAYS deleted whether the workload fails or passes
        run: |
          echo "Starting infrastructure teardown..."
          kind delete cluster --name ci-integration-cluster
          echo "Kubernetes cluster successfully deleted."
